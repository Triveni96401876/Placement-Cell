<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGP Placement Cell</title>
    <!-- Use ROOT-relative paths as it will be deployed to ROOT -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --skyblue-main: #0095ff;
            --skyblue-dark: #0077cc;
            --bg-light: #f0f7ff;
            --white: #ffffff;
            --text-dark: #1e293b;
            --shadow: 0 10px 40px rgba(0, 149, 255, 0.1);
        }

        body {
            background: #003366;
            background-image: linear-gradient(135deg, #003366 0%, #0095ff 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
        }

        header {
            background: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .auth-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
        }

        .auth-box {
            background: var(--white);
            padding: 3.5rem 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        /* Role Selector Styles */
        .role-selector {
            display: flex;
            background: #e9ecef;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 2.5rem;
        }

        .role-option {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: #6c757d;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .role-option.active {
            color: white;
            background: var(--skyblue-main);
            box-shadow: 0 4px 12px rgba(0, 149, 255, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #495057;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: var(--skyblue-main);
            background: white;
        }

        .btn-login {
            background: var(--skyblue-main);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 149, 255, 0.2);
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: var(--skyblue-dark);
            transform: translateY(-2px);
        }

        #signup-prompt a {
            color: var(--skyblue-main);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar"
            style="max-width: 1200px; margin: 0 auto; padding: 0 2rem; height: 75px; display: flex; align-items: center; justify-content: space-between;">
            <div class="logo-container">
                <a href="index.jsp" style="display:flex; align-items:center; gap:1rem; text-decoration: none;">
                    <img src="images/sgp1.jpeg" alt="SGP Logo" style="width: 45px; height: 45px; border-radius: 8px;">
                    <h2 style="color: var(--skyblue-main); font-weight: 800; margin: 0;">SGP</h2>
                </a>
            </div>
            <a href="index.jsp" style="color: #6c757d; text-decoration: none; font-weight: 600;"><i
                    class="fas fa-home"></i> Back to Home</a>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <div id="login-header" style="margin-bottom: 2rem;">
                <i id="header-icon" class="fas fa-user-circle fa-4x" style="color: var(--skyblue-main);"></i>
                <h2 id="role-title" style="color: var(--text-dark); margin-top: 1rem; font-weight: 800;">Student Login
                </h2>
                <p id="role-subtitle" style="color: #6c757d; font-size: 0.9rem;">Access your placement dashboard</p>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <div class="role-option active" onclick="switchRole('student')">Student</div>
                <div class="role-option" onclick="switchRole('hod')">HOD</div>
                <div class="role-option" onclick="switchRole('admin')">Admin</div>
            </div>

            <form id="login-form" action="LoginServlet" method="POST">
                <input type="hidden" name="role" id="role-input" value="student">
                <div class="form-group">
                    <label id="user-label">Email Address</label>
                    <input type="text" name="email" id="username" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="login-btn">Login to Dashboard</button>
            </form>

            <p id="signup-prompt" style="margin-top: 2rem; font-size: 0.9rem; color: #6c757d;">
                Don't have an account? <a href="register.html">Sign Up</a>
            </p>
        </div>
    </main>

    <script>
        function switchRole(role) {
            const roleInput = document.getElementById('role-input');
            const options = document.querySelectorAll('.role-option');
            const title = document.getElementById('role-title');
            const subtitle = document.getElementById('role-subtitle');
            const icon = document.getElementById('header-icon');
            const userLabel = document.getElementById('user-label');
            const userInput = document.getElementById('username');
            const btn = document.getElementById('login-btn');
            const signup = document.getElementById('signup-prompt');

            roleInput.value = role;
            options.forEach(opt => opt.classList.remove('active'));

            if (role === 'admin') {
                options[2].classList.add('active');
                title.innerText = "Admin Login";
                subtitle.innerText = "Official Administrator Access";
                icon.className = "fas fa-user-shield fa-4x";
                userLabel.innerText = "Admin ID / Email";
                userInput.placeholder = "Enter Admin Username";
                btn.innerText = "Access Admin Center";
                signup.style.display = "none";
            } else if (role === 'hod') {
                options[1].classList.add('active');
                title.innerText = "HOD Login";
                subtitle.innerText = "Departmental Administration Portal";
                icon.className = "fas fa-user-graduate fa-4x";
                userLabel.innerText = "HOD ID / Email";
                userInput.placeholder = "Enter HOD Credentials";
                btn.innerText = "Login to HOD Portal";
                signup.style.display = "none";
            } else {
                options[0].classList.add('active');
                title.innerText = "Student Login";
                subtitle.innerText = "Access your placement dashboard";
                icon.className = "fas fa-user-circle fa-4x";
                userLabel.innerText = "Email Address";
                userInput.placeholder = "Enter your email";
                btn.innerText = "Login to Dashboard";
                signup.style.display = "block";
            }
        }
    </script>
</body>

</html>
