<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - SGP</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--primary-color);
            color: white;
            padding: 2rem;
        }

        .sidebar h2 {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .sidebar ul li {
            margin-bottom: 1rem;
        }

        .sidebar a {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .sidebar a:hover {
            color: white;
            padding-left: 5px;
            transition: 0.3s;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            background: var(--light-bg);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .dash-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .dash-card h3 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <h2>SGP Student</h2>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">My Profile</a></li>
                <li><a href="#">Circulars (Jobs)</a></li>
                <li><a href="#">Update Resume</a></li>
                <li><a href="#">DigiLocker</a></li>
                <li><a href="index.html" style="margin-top: 5rem; display:block;">Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <!-- Title in the right head corner -->
            <div
                style="display: flex; justify-content: flex-end; border-bottom: 2px solid #edeff2; padding-bottom: 1rem; margin-bottom: 2rem;">
                <h1 style="color: var(--primary-color); font-weight: 700; font-size: 1.1rem; margin: 0;">Welcome,
                    dolly1234</h1>
            </div>

            <div class="card-grid">
                <div class="dash-card">
                    <h3>0</h3>
                    <p>Active Applications</p>
                </div>
                <div class="dash-card">
                    <h3>Eligible</h3>
                    <p>Current Status</p>
                </div>
                <div class="dash-card">
                    <h3 style="color: green;">85%</h3>
                    <p>Profile Completeness</p>
                </div>
            </div>

            <h2 style="margin-top: 3rem;">Latest Circulars</h2>
            <div style="background: white; padding: 1rem; border-radius: 10px; margin-top: 1rem;">
                <p>No new job postings available at the moment.</p>
            </div>
        </div>
    </div>
</body>

</html>
