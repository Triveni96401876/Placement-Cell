<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | SGP Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #003366;
            --secondary: #0056b3;
            --accent: #e63946;
            --success: #28a745;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .profile-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 800px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            background: var(--primary);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
        }

        .profile-header h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .profile-header p {
            opacity: 0.8;
            margin-top: 10px;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        .profile-body {
            padding: 3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
        }

        input,
        textarea,
        select {
            padding: 14px 20px;
            border: 2px solid #edeff2;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.3s;
            background: white;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(0, 86, 179, 0.1);
        }

        .footer-actions {
            margin-top: 3rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-cancel {
            background: #eee;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.3);
        }

        .btn-save:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 51, 102, 0.4);
        }

        /* Success Message */
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            display: none;
            z-index: 1000;
            animation: fadeInRight 0.5s;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .profile-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div id="notification"></div>

    <div class="profile-container">
        <div class="profile-header">
            <a href="login-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <h1>Edit Personal Details</h1>
            <p>Keep your information up to date for better job recommendations.</p>
        </div>

        <div class="profile-body">
            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="registerNumber">Register Number (Read Only)</label>
                        <input type="text" id="registerNumber" readonly
                            style="background: #f8f9fa; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="student@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="+91 XXXXX XXXXX" required>
                    </div>

                    <div class="form-group">
                        <label for="branch">Branch / Department</label>
                        <select id="branch">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Science">Information Science</option>
                            <option value="Electronics & Communication">Electronics & Communication</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cgpa">Current CGPA</label>
                        <input type="number" step="0.01" id="cgpa" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="historyOfBacklog">History of Backlogs</label>
                        <select id="historyOfBacklog">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="address">Permanent Address</label>
                        <textarea id="address" rows="3" placeholder="Enter your full home address"></textarea>
                    </div>
                </div>

                <div class="footer-actions">
                    <button type="button" class="btn btn-cancel"
                        onclick="window.location.href='login-dashboard.html'">Back</button>
                    <button type="submit" id="saveBtn" class="btn btn-save" style="background: #2ecc71; flex: 1;">Commit
                        Changes & Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Use a mock student ID for demo, in real app get from localStorage
        const studentId = localStorage.getItem('studentId') || 1;
        const API_BASE_URL = 'http://localhost:8081/api/students';

        // Load current profile data
        async function loadProfile() {
            try {
                const response = await fetch(`${API_BASE_URL}/profile/${studentId}`);
                if (!response.ok) throw new Error('Failed to fetch profile');

                const data = await response.json();

                // Populate form
                document.getElementById('registerNumber').value = data.registerNumber || 'N/A';
                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('phoneNumber').value = data.phoneNumber || '';
                document.getElementById('branch').value = data.branch || 'Computer Science';
                document.getElementById('gender').value = data.gender || 'Male';
                document.getElementById('cgpa').value = data.cgpa || '';
                document.getElementById('historyOfBacklog').value = data.historyOfBacklog || 'No';
                document.getElementById('address').value = data.address || '';

            } catch (error) {
                console.error('Error:', error);
                showNotification('Error loading profile details', 'error');
            }
        }

        // Save updated profile data
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Committing to Database...';
            btn.disabled = true;

            const updatedData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                branch: document.getElementById('branch').value,
                gender: document.getElementById('gender').value,
                cgpa: parseFloat(document.getElementById('cgpa').value),
                historyOfBacklog: document.getElementById('historyOfBacklog').value,
                address: document.getElementById('address').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/profile/${studentId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                if (response.ok) {
                    showNotification('Changes Committed Successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'login-dashboard.html';
                    }, 2000);
                } else {
                    throw new Error('Update failed');
                }
            } catch (error) {
                showNotification('Failed to commit changes. Please try again.', 'error');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        function showNotification(message, type) {
            const el = document.getElementById('notification');
            el.innerText = message;
            el.style.display = 'block';
            el.style.background = type === 'success' ? '#28a745' : '#e63946';

            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }

        // Initialize
        loadProfile();
    </script>
</body>

</html>
