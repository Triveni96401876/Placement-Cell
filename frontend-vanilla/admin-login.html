<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SGP Placement Cell</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-primary: #00a8ff;
            --admin-dark: #0097e6;
            --bg-light: #f5f6fa;
            --white: #ffffff;
            --text-dark: #2f3640;
            --text-muted: #7f8fa6;
            --shadow: 0 8px 32px 0 rgba(0, 168, 255, 0.1);
        }

        body {
            background: var(--bg-light);
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .auth-container {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-box {
            background: var(--white);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(0, 168, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #edeff2;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--admin-primary);
            box-shadow: 0 0 10px rgba(0, 168, 255, 0.1);
        }

        .btn-admin {
            background: var(--admin-primary);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.2);
            margin-top: 1rem;
        }

        .btn-admin:hover {
            background: var(--admin-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 168, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header style="background: white; border-bottom: 2px solid #f0f3ff;">
        <div class="navbar"
            style="max-width: 1200px; margin: 0 auto; padding: 0 2rem; height: 75px; display: flex; align-items: center; justify-content: space-between;">
            <div class="logo-container">
                <a href="index.html" style="display:flex; align-items:center; gap:1rem; text-decoration: none;">
                    <img src="images/sgp1.jpeg" alt="SGP Logo" style="width: 45px; height: 45px; border-radius: 8px;">
                    <h2 style="color: var(--admin-primary); font-weight: 800; letter-spacing: 1px; margin: 0;">ADMIN
                        CENTER</h2>
                </a>
            </div>
            <a href="index.html" class="nav-link"
                style="color: var(--text-muted); text-decoration: none; font-weight: 600;"><i class="fas fa-home"></i>
                Back to Home</a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div
                    style="width: 80px; height: 80px; background: #f0f9ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <i class="fas fa-user-shield fa-3x" style="color: var(--admin-primary);"></i>
                </div>
                <h2 style="color: var(--text-dark); margin: 0; font-weight: 800; font-size: 1.6rem;">Admin Login</h2>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 5px;">Enter administrator credentials
                </p>
            </div>

            <form id="admin-login-form" action="admin-dashboard.html" method="GET">
                <div class="form-group">
                    <label>Administrator ID</label>
                    <input type="text" id="admin-user" placeholder="Enter Admin Username" required>
                </div>
                <div class="form-group">
                    <label>Secure Password</label>
                    <input type="password" id="admin-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-admin">
                    Access Admin Center
                </button>
            </form>

            <p style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                Strictly for authorized personnel only.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').onsubmit = function (e) {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;

            if (user === 'nayeembashasir' && pass === 'nayeembashasir') {
                return true;
            } else {
                e.preventDefault();
                alert("Invalid Admin Credentials. Please try again.");
                return false;
            }
        }
    </script>

</body>

</html>
