<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job | SGP Admin</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/admin-style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--admin-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .full-width {
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div class="logo-area">
            <img src="images/sgp1.jpeg" alt="SGP Logo" class="admin-logo"
                onerror="this.src='https://via.placeholder.com/40x40?text=SGP'">
            <span style="font-size: 1.2rem; font-weight: 700;">SGP ADMIN CENTER</span>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="admin-dashboard.jsp" style="color: white; text-decoration: none;"><i
                    class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </header>

    <div class="container" style="display: flex;">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <nav class="admin-nav">
                <a href="admin-dashboard.jsp" class="admin-nav-item">
                    <i class="fas fa-chart-line"></i> Dashboard Overview
                </a>
                <a href="#" class="admin-nav-item active">
                    <i class="fas fa-plus-circle"></i> Post New Job
                </a>
                <a href="#" class="admin-nav-item">
                    <i class="fas fa-users"></i> Student Records
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2><i class="fas fa-briefcase"></i> Post New Job Opening</h2>
                    <p style="color: var(--admin-secondary);">Fill details to notify students about a new opportunity
                    </p>
                </div>

                <form action="admin-dashboard.jsp" method="GET" style="margin-top: 2rem;">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" placeholder="e.g. JSW Steel Ltd." required>
                        </div>
                        <div class="form-group">
                            <label>Job Title / Role</label>
                            <input type="text" placeholder="e.g. Graduate Engineer Trainee" required>
                        </div>
                        <div class="form-group">
                            <label>Placement Location</label>
                            <input type="text" placeholder="e.g. Ballari, KA" required>
                        </div>
                        <div class="form-group">
                            <label>CTC Package (₹ LPA)</label>
                            <input type="text" placeholder="e.g. 6.5 LPA" required>
                        </div>
                        <div class="form-group">
                            <label>Minimum CGPA Required</label>
                            <input type="number" step="0.1" placeholder="e.g. 7.5" required>
                        </div>
                        <div class="form-group">
                            <label>Last Date to Apply</label>
                            <input type="date" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Eligibility Criteria (Branches)</label>
                            <div style="display: flex; gap: 15px; margin-top: 5px;">
                                <label style="font-weight: 400;"><input type="checkbox" checked> CS</label>
                                <label style="font-weight: 400;"><input type="checkbox"> EC</label>
                                <label style="font-weight: 400;"><input type="checkbox"> ME</label>
                                <label style="font-weight: 400;"><input type="checkbox"> EE</label>
                                <label style="font-weight: 400;"><input type="checkbox"> CE</label>
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>Job Description & Requirements</label>
                            <textarea
                                placeholder="Outline the job responsibilities and required technical skills..."></textarea>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" class="btn-admin-primary" style="background: var(--admin-accent);">
                            <i class="fas fa-paper-plane"></i> Publish Job Opening
                        </button>
                        <button type="reset" class="btn-admin-primary" style="background: var(--admin-secondary);">
                            Reset Form
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>

</html>
